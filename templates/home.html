
<style>
.login{
    width:200px;
    padding:20px;
    background:w;
    border-radius:10px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    text-align:center;
    font-size:20px;
    font-family:Arial;
    animation: move 3s infinite alternate;
}

.login:hover{
    transform:scale(1.05);
    box-shadow:0px 6px 25px rgba(0,0,0,0.3);
}

button {
    padding: 12px 30px;
    color: white;
    background: #ff00aa;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    0% { box-shadow: 0 0 5px #ff00aa; }
    100% { box-shadow: 0 0 20px #ff00aa; }
}

h1 {
    color: black;
    text-align: center;
    
}

p {
    font-size: 18px;
    color: gray;
    
}
</style>
</style>
<center>
<h1> welcome to karan simple dashbord platform </h1>

  {% with messages = get_flashed_messages() %}
        {% for m in messages %}
 <p style="color: green;">{{ m }}</p>
        {% endfor %}
 {% endwith %}
 <div class="login">
<h1>Login Form</h1>
<form action="/login" method="POST">
    <input type="email" name="email" placeholder="enter email"><br></br>
    <input type="password" name="password" placeholder="enter password"><br></br>
    <button type="submit">Login</button>
</form>

<p>if you have no account plase <b><a href='/sing'>Register</a></b></p>
</div>
</center>
